<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模块化科研教学光路展示与分析系统 | Modular Optical Path System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles/base.css">
  <link rel="stylesheet" href="./src/styles/theme.css">
  <link rel="stylesheet" href="./src/styles/layout.css?v=20260630-principle-layout">
  <link rel="stylesheet" href="./src/styles/components.css">
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <div class="logo-area">
        <svg class="logo-icon" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="9" stroke-dasharray="4 2"></circle>
          <path d="M12 2v20M2 12h20" stroke-linecap="round"></path>
          <path d="M12 12l7-7M12 12l-7 7" stroke="currentColor" stroke-dasharray="1 1"></path>
        </svg>
        <div class="logo-text">
          <h1>光路模块化分析系统</h1>
          <span class="logo-subtitle">Raman · PL · SHG · Polarization Simulation</span>
        </div>
      </div>
      
      <div class="toolbar">
        <button id="toggle-theme" class="btn btn-secondary" title="切换深色/浅色主题">
          <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <span class="btn-text">主题</span>
        </button>
        
        <button id="toggle-grid" class="btn btn-secondary active" title="显示/隐藏光学面包板网格">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <path d="M9 3v18M15 3v18M3 9h18M3 15h18"></path>
          </svg>
          <span>面包板网格</span>
        </button>
        
        <button id="toggle-formulas" class="btn btn-secondary" title="显示/隐藏理论公式与标注">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20M4 19.5V3a1 1 0 0 1 1-1h15a1 1 0 0 1 1 1v19a1 1 0 0 1-1 1H6.5a2.5 2.5 0 0 1-2.5-2.5z"></path>
            <path d="M9 6h6M9 10h6M9 14h4"></path>
          </svg>
          <span>理论标注</span>
        </button>

        <button id="export-svg" class="btn btn-primary" title="导出当前矢量图 (SVG格式)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"></path>
          </svg>
          <span>导出 SVG</span>
        </button>
      </div>
    </header>

    <main class="main-layout">
      <!-- Left Panel: Navigation Directory -->
      <aside class="sidebar-left card">
        <div class="sidebar-header">
          <h3>系统光路目录</h3>
          <span class="badge" id="layout-count">9 个预设</span>
        </div>
        <div class="layout-list-container" id="layout-list">
          <!-- Dynamically populated -->
        </div>
      </aside>

      <!-- Center Panel: SVG Canvas -->
      <section class="canvas-container card">
        <div class="canvas-header">
          <div class="layout-title-area">
            <span id="current-category" class="category-tag">RAMAN</span>
            <h2 id="current-title">Parallel-polarized Raman (VV)</h2>
          </div>
          <div class="canvas-legend" id="canvas-legend">
            <!-- Dynamic legends based on active layout -->
          </div>
        </div>
        <div class="svg-wrapper">
          <svg id="optical-canvas" viewBox="0 0 1600 900" role="img" xmlns="http://www.w3.org/2000/svg">
            <!-- Render layers -->
            <g id="layer-grid"></g>
            <g id="layer-beams"></g>
            <g id="layer-components"></g>
            <g id="layer-polarization"></g>
            <g id="layer-labels"></g>
            <g id="layer-annotations"></g>
          </svg>
        </div>
      </section>

      <!-- Right Panel: Info & Control Panels -->
      <aside class="sidebar-right">
        <!-- Panel 1: Settings & Sliders -->
        <section class="control-card card">
          <div class="panel-header">
            <svg class="panel-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 7h-9m-4 0H4m16 5h-4m-4 0H4m16 5h-7m-4 0H4M12 5v4M8 10v4M12 15v4"></path>
            </svg>
            <h3>参数微调与仿真</h3>
          </div>
          <div class="control-content" id="params-panel">
            <!-- Dynamic sliders and selectors -->
          </div>
        </section>

        <!-- Panel 2: Physical Explanation -->
        <section class="info-card card">
          <div class="panel-header">
            <svg class="panel-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path>
              <path d="M12 16v-4M12 8h.01"></path>
            </svg>
            <h3>实验与物理原理</h3>
          </div>
          <div class="info-content" id="theory-panel">
            <!-- Dynamic explanation text -->
          </div>
        </section>

        <!-- Panel 3: Hovered Component Details -->
        <section class="detail-card card" id="component-detail-card">
          <div class="panel-header">
            <svg class="panel-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <path d="M9 9h6M9 13h6M9 17h4"></path>
            </svg>
            <h3>光学元器件说明</h3>
          </div>
          <div class="detail-content" id="component-detail">
            <p class="placeholder-text">将鼠标悬停在光路中的光学元件上以查看其详细技术规范。</p>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <div id="tooltip" class="optical-tooltip" style="display:none; position:absolute; pointer-events:none; z-index:9999;"></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
